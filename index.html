<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stock Inc. が作った HTML ゲームコレクション。ブラウザからすぐに遊べます。">
  <title>🎮 Stock Inc. Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Header ── */
    .hero {
      text-align: center;
      padding: 4rem 1rem 3rem;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
      animation: drift 20s ease-in-out infinite alternate;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(-5%, 3%); }
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    .hero p {
      margin-top: 0.75rem;
      font-size: 1.1rem;
      color: #94a3b8;
      position: relative;
    }

    /* ── Games Grid ── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #c4b5fd;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .game-card {
      background: rgba(30, 30, 50, 0.7);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.4);
    }

    .game-card .emoji {
      font-size: 2.5rem;
    }

    .game-card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e2e8f0;
    }

    .game-card p {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.25em 0.7em;
      border-radius: 999px;
      width: fit-content;
    }

    .badge--coming-soon {
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
    }

    .badge--playable {
      background: rgba(52, 211, 153, 0.15);
      color: #34d399;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.85rem;
      color: #475569;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .footer a {
      color: #818cf8;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header class="hero">
    <h1>🎮 Stock Inc. Games</h1>
    <p>適当に作った HTML ゲームたち</p>
  </header>

  <main class="container">
    <h2 class="section-title">🕹️ ゲーム一覧</h2>

    <div class="games-grid">

      <!-- ブロッコリーシューター -->
      <div class="game-card">
        <span class="emoji">🥦</span>
        <h2>ブロッコリーシューター</h2>
        <p>迫りくるブロッコリーを撃ち落とせ！シンプルなシューティングゲーム。</p>
        <span class="badge badge--coming-soon">Coming Soon</span>
      </div>

      <!-- 新しいゲームはここに追加 -->

    </div>
  </main>

  <footer class="footer">
    <p>© 2026 Stock Inc. · <a href="https://github.com/shunichi-takeda/stock-inc-games">GitHub</a></p>
  </footer>

</body>
</html>
